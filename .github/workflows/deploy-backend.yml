name: Deploy Backend to Hugging Face Spaces

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'requirements.txt'
      - 'Dockerfile'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face Hub
        env:
          HF_TOKEN: ${{ secrets.SENTRAVISION }}
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          # Create a fresh branch with only the necessary files for the backend
          git checkout --orphan hf-deployment
          git rm -rf .
          git checkout main -- backend/ requirements.txt Dockerfile README.md
          # Dynamically prepend Hugging Face config to README.md just for this deployment
          echo -e "---\ntitle: SentraVision\nemoji: 🛡️\ncolorFrom: blue\ncolorTo: green\nsdk: docker\npinned: false\n---\n" > hf_readme_temp.md
          cat README.md >> hf_readme_temp.md
          mv hf_readme_temp.md README.md
          git add README.md
          git commit -m "Deploy to Hugging Face Spaces"
          # Add remote and push ONLY this clean branch to HF's main branch
          git remote add hf https://huggingface.co/spaces/mayukh30/sentraVision
          git push -f https://mayukh30:$HF_TOKEN@huggingface.co/spaces/mayukh30/sentraVision hf-deployment:main
